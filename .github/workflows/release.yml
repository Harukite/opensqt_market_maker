name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-assets:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            package_os_name: linux
          - goos: windows
            goarch: amd64
            package_os_name: windows
          - goos: darwin
            goarch: arm64
            package_os_name: MacOS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify version matches tag
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(grep -E '^var Version = "[^"]+"' main.go | sed -E 's/^var Version = "([^"]+)"$/\1/')
          if [[ "$VERSION" != "${GITHUB_REF_NAME}" ]]; then
            echo "main.go 版本号 $VERSION 与 tag ${GITHUB_REF_NAME} 不一致" >&2
            exit 1
          fi

      - name: Build release package
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/package_release.sh
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} PACKAGE_OS_NAME=${{ matrix.package_os_name }} VERSION=${GITHUB_REF_NAME} ./scripts/package_release.sh

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/opensqt_market_maker_${{ github.ref_name }}_${{ matrix.package_os_name }}_${{ matrix.goarch }}.*

  publish-release:
    runs-on: ubuntu-latest
    needs: build-assets

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            Automated release package for ${{ github.ref_name }}.

            Included assets:
            - Linux amd64 archive
            - Windows amd64 archive
            - MacOS arm64 archive
            - SHA256 checksum files
          files: |
            release-assets/*
